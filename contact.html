<!DOCTYPE html>
<html>
    <head>
        <link href="main.css" rel="stylesheet">
        <title>Contact | The Wish Project</title>
        <link rel="icon" type="image/x-icon" href="images/TheWishProjectLogo.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <meta name="description" content="Donate or volunteer">
        <meta name="keywords" content="wish, donate, volunteer, help">    
    </head>
    <body>
        <main>
            <div class="outerRow">
                <div class="innerRow">
                    <div class="col">
                     <h1>Contact</h1>
                    </div>
                </div>
                <div class="innerRow">
                    <div class="col horizon">
                        <h2>Hours</h2>
                        <p>Our warehouse is open from 9:00 – 3:00 Tuesday – Saturday</p>
                        <h2>Phone</h2>
                        <p>866-947-4360</p>
                        <h2>Physical Address</h2>
                        <p>166 Middlesex St</p>
                        <p>North Chelmsford, MA 01863</p>
                        <p>(Behind Hertz Rental and next to Welch’s Welding)</p>
                    </div>
                    <div class="col ">
                        <img src="images/355295194_697831745487949_2925801218869525407_n.jpg">
                    
                        </div>

                </div>
            </div>
            <div class="outerRow tan">
                <div class="innerRow">
                    <div class="col">
                        <form>
                            <label for="name">Enter your name:</label>
                            <input type="text" id="name" name="name" required>
                            
                            <label for="phone">Enter your phone number:</label>
                            <input type="tel" id="phone" name="phone" required>
                           
                            <label for="subject">Subject:</label>
                            <select id="subject" name="subject" required>
                                <option value="general">General</option>
                                <option value="volunteer">Volunteer</option>
                                <option value="projects">Projects</option>
                                <option value="donation">Donation</option>
                            </select>

                            <label for="email">Enter your email:</label>
                            <input type="email" id="email" name="email" required>                            

                            <label for="message">Message:</label>
                            <input type="message" id="message" name="message" required>
                        
                            <input type="submit" value="Submit">
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
