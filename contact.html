<!DOCTYPE html>
<html>
    <head>
        <link href="main.css" rel="stylesheet">
        <title>Contact | The Wish Project</title>
        <link rel="icon" type="image/x-icon" href="images/TheWishProjectLogo.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <meta name="description" content="Donate or volunteer">
        <meta name="keywords" content="wish, donate, volunteer, help">    
    </head>
    <body>
        <main>
            <div class="outerRow">
                <div class="innerRow">
                    <h1>Contact</h1>
                </div>
                <div class="innerRow">
                    <div class="col">
                        <form>
                            <label for="name">Enter your name:</label>
                            <input type="radio" id="name" name="name">
                            
                            <label for="phone">Enter your phone number:</label>
                            <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
                           
                            <label for="subject">Subject:</label>
                            
                            <select id="subject" name="cars">
                                <option value="general">General</option>
                                <option value="volunteer">Volunteer</option>
                                <option value="projects">Projects</option>
                                <option value="donation">Donation</option>
                            </select>

                            <label for="email">Enter your email:</label>
                            <input type="email" id="email" name="email">                            

                            <label for="message">Message:</label>
                            <input type="message" id="message" name="message">
                        
                            <input type="submit" value="Submit">
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
